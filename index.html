<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더 북맨 1본부 출판 편집 에이전트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1c1c1c; --ink2: #4a4a4a; --ink3: #888; --ink4: #bbb;
    --surface: #fafaf8; --surface2: #f4f2ed; --surface3: #eceae4;
    --accent: #2c4a2e; --accent2: #3d6b41; --accent3: #4e8c54;
    --accent-light: #eaf2ea; --accent-lighter: #f2f8f2;
    --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.05);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-lg: 0 2px 8px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
    --radius: 8px; --radius-lg: 12px; --radius-xl: 16px; --sidebar: 220px;
  }
  html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--surface2); color: var(--ink); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: var(--sidebar); background: var(--accent); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .sidebar-logo { padding: 28px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-logo-text { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.3px; line-height: 1.4; }
  .sidebar-logo-sub { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; letter-spacing: 0.5px; }
  .sidebar-nav { padding: 16px 0; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 20px; cursor: pointer; transition: all 0.15s; color: rgba(255,255,255,0.6); font-size: 12.5px; font-weight: 400; border-left: 3px solid transparent; }
  .nav-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.06); }
  .nav-item.on { color: #fff; background: rgba(255,255,255,0.1); border-left-color: rgba(255,255,255,0.7); font-weight: 500; }
  .nav-num { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
  .nav-item.on .nav-num { background: rgba(255,255,255,0.3); }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 10px; color: rgba(255,255,255,0.3); line-height: 1.6; }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
  .topbar-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 600; color: var(--ink); letter-spacing: -0.3px; }
  .topbar-badge { font-size: 11px; padding: 3px 10px; background: var(--accent-light); color: var(--accent); border-radius: 20px; font-weight: 500; }
  .content { padding: 28px 32px; flex: 1; max-width: 860px; }
  .panel { display: none; animation: fadeIn 0.2s ease; }
  .panel.on { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .section { margin-bottom: 22px; }
  .section-label { font-size: 11px; font-weight: 500; color: var(--ink3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
  .field-label { font-size: 13px; font-weight: 500; color: var(--ink2); margin-bottom: 8px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px 24px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .card-title { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border2); }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { padding: 6px 14px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--ink3); background: var(--surface); transition: all 0.12s; user-select: none; }
  .chip:hover { border-color: var(--accent3); color: var(--accent); background: var(--accent-lighter); }
  .chip.on { background: var(--accent-light); border-color: var(--accent2); color: var(--accent); font-weight: 500; }
  input[type=text], textarea, select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; color: var(--ink); background: #fff; outline: none; transition: border 0.12s, box-shadow 0.12s; line-height: 1.7; }
  input[type=text]:focus, textarea:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(44,74,46,0.08); }
  textarea { resize: vertical; min-height: 100px; }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .input-grid .full { grid-column: 1 / -1; }
  .file-zone { border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 18px; text-align: center; cursor: pointer; transition: all 0.12s; background: var(--surface2); }
  .file-zone:hover { border-color: var(--accent2); background: var(--accent-lighter); }
  .file-zone-text { font-size: 12px; color: var(--ink3); }
  .file-zone-text strong { color: var(--accent); }
  .file-name { font-size: 12px; color: var(--accent); margin-top: 6px; font-weight: 500; }
  .hint { font-size: 11px; color: var(--ink4); margin-top: 6px; }
  .multi-note { font-size: 11px; color: var(--ink3); margin-bottom: 8px; }
  .run-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px; margin-top: 4px; }
  .run-btn:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(44,74,46,0.25); }
  .run-btn:active { transform: translateY(0); }
  .run-btn .arrow { font-size: 14px; transition: transform 0.15s; }
  .run-btn:hover .arrow { transform: translateX(3px); }
  .output-wrap { display: none; margin-top: 24px; animation: fadeIn 0.2s ease; }
  .output-wrap.on { display: block; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .output-label { font-size: 11px; font-weight: 500; color: var(--ink3); letter-spacing: 0.8px; text-transform: uppercase; }
  .output-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .otab { padding: 5px 13px; font-size: 11.5px; font-family: 'Noto Sans KR', sans-serif; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--ink3); background: #fff; transition: all 0.12s; }
  .otab:hover { color: var(--ink); }
  .otab.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .output-box { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; font-size: 13px; line-height: 1.9; color: var(--ink2); white-space: pre-wrap; min-height: 120px; box-shadow: var(--shadow); position: relative; }
  .copy-btn { position: absolute; top: 12px; right: 14px; padding: 4px 11px; font-size: 11px; font-family: 'Noto Sans KR', sans-serif; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; color: var(--ink3); background: var(--surface2); transition: all 0.12s; }
  .copy-btn:hover { color: var(--ink); background: var(--surface3); }
  .loading { text-align: center; padding: 32px; color: var(--ink3); font-size: 13px; }
  .dots { display: inline-flex; gap: 4px; margin-left: 4px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink4); animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .divider { height: 1px; background: var(--border2); margin: 20px 0; }
  .dl-btn { padding: 6px 16px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; border: 1px solid var(--accent2); color: var(--accent); background: var(--accent-light); }
  .dl-btn:hover { background: var(--accent); color: #fff; }
  .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .comp-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px; }
  .comp-table th { background: var(--accent); color: #fff; padding: 10px 12px; text-align: left; font-weight: 500; }
  .comp-table td { padding: 10px 12px; border-bottom: 1px solid var(--border2); vertical-align: top; line-height: 1.5; }
  .comp-table tr:hover td { background: var(--surface2); }
