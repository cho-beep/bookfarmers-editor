<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더 북맨 편집 툴</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f4f0; color: #1a1a1a; }
header { background: #1a1a1a; color: #fff; padding: 16px 24px; }
header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
.tabs { display: flex; background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; overflow-x: auto; }
.tab { padding: 14px 18px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; white-space: nowrap; }
.tab.active { border-bottom-color: #1a1a1a; color: #1a1a1a; font-weight: 600; }
.container { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 100px); }
.left { background: #fff; border-right: 1px solid #e0e0e0; padding: 24px; overflow-y: auto; }
.right { padding: 24px; overflow-y: auto; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; }
.field textarea { height: 80px; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #1a1a1a; }
.btn { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn:hover { background: #333; }
.btn:disabled { background: #999; cursor: not-allowed; }
.divider { height: 1px; background: #f0f0f0; margin: 16px 0; }
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #ccc; text-align: center; }
.empty .glyph { font-size: 48px; margin-bottom: 16px; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 16px; color: #888; }
.dots { display: flex; gap: 6px; }
.dots span { width: 8px; height: 8px; background: #1a1a1a; border-radius: 50%; animation: bounce 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-10px)} }
.result-box { background: #fff; border-radius: 8px; padding: 24px; white-space: pre-wrap; font-size: 14px; line-height: 1.8; }
.section-title { font-size: 13px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; margin-top: 24px; }
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
.book-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.book-card img { width: 100%; height: 190px; object-fit: cover; }
.book-card .info { padding: 10px; }
.book-card .title { font-size: 12px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
.book-card .author { font-size: 11px; color: #888; }
.book-card .publisher { font-size: 11px; color: #aaa; }
.comp-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; font-size: 13px; }
.comp-table th { background: #1a1a1a; color: #fff; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 12px; }
.comp-table td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: top; line-height: 1.5; }
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tr:hover td { background: #f9f9f9; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #f0f0f0; color: #555; }
.status-bar { background: #f0f0f0; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #666; margin-bottom: 16px; }
</style>
</head>
<body>
<header><h1>📚 더 북맨 편집 툴</h1></header>
<div class="tabs">
  <div class="tab active" onclick="switchTab('trend')">트렌드 분석</div>
  <div class="tab" onclick="switchTab('compete')">경쟁도서 분석</div>
  <div class="tab" onclick="switchTab('copy')">제목·카피 작성</div>
  <div class="tab" onclick="switchTab('manuscript')">원고 검토</div>
</div>
<div class="container">
  <div class="left" id="leftPanel"></div>
  <div class="right" id="rightPanel">
    <div class="empty"><div class="glyph">📖</div><p>정보를 입력하고<br>분석을 시작해주세요.</p></div>
  </div>
</div>

<script>
const SERVER = 'https://bookfarmers-server-production.up.railway.app';

async function callAI(prompt) {
  const fd = new FormData();
  fd.append('prompt', prompt);
  const res = await fetch(`${SERVER}/api/analyze`, { method: 'POST', body: fd });
  const data = await res.json();
  return data.result || data.error || '결과를 가져올 수 없습니다.';
}

async function callAIWithFile(prompt, file) {
  const fd = new FormData();
  fd.append('prompt', prompt);
  if (file) fd.append('file', file);
  const res = await fetch(`${SERVER}/api/analyze`, { method: 'POST', body: fd });
  const data = await res.json();
  return data.result || data.error || '결과를 가져올 수 없습니다.';
}

async function fetchBooks(query, display = 30, sort = 'date') {
  const res = await fetch(`${SERVER}/api/books?query=${encodeURIComponent(query)}&display=${display}&sort=${sort}`);
  const data = await res.json();
  return data.items || [];
}

async function fetchNews(query) {
  const res = await fetch(`${SERVER}/api/news?query=${encodeURIComponent(query)}`);
  const data = await res.json();
  return data.items || [];
}

const GENRE_MAP = {
  '소설/에세이': ['소설 베스트셀러', '에세이 베스트셀러'],
  '인문/교양': ['인문 베스트셀러', '교양 베스트셀러'],
  '자기계발': ['자기계발 베스트셀러'],
  '경제경영': ['경제경영 베스트셀러']
};

const GENRE_TITLE_PATTERN = {
  '소설/에세이': '감성적·시적 제목, 인물/장소 중심, 은유적 표현 선호. 예: "채식주의자", "82년생 김지영", "아몬드"',
  '인문/교양': '질문형 또는 명사형 제목, 지적 호기심 자극. 예: "총균쇠", "왜 세계의 절반은 굶주리는가"',
  '자기계발': '직관적·숫자형·행동 유발형. 예: "미라클 모닝", "1만 시간의 법칙", "아주 작은 습관의 힘"',
  '경제경영': '트렌드 키워드 + 실용적 제목. 예: "부의 추월차선", "주식 투자 무작정 따라하기"'
};

const TABS = {
  trend: {
    fields: [
      { id: 'keyword', label: '검색 키워드', type: 'input', placeholder: '예: 자기계발, 감정, 관계' },
      { id: 'genre', label: '분야', type: 'select', options: ['전체', '소설/에세이', '인문/교양', '자기계발', '경제경영'] },
    ],
    run: async (v) => {
      const right = document.getElementById('rightPanel');
      right.innerHTML = '<div class="status-bar">📡 네이버 책 검색 중…</div>';

      const books = await fetchBooks(v.keyword, 30, 'date');

      if (books.length) {
        right.innerHTML = `<div class="section-title">🔍 최신 도서 (${books.length}건)</div>`;
        let grid = '<div class="book-grid">';
        books.slice(0,12).forEach(b => {
          const title = b.title.replace(/<[^>]+>/g,'');
          const author = b.author.replace(/<[^>]+>/g,'');
          grid += `<div class="book-card"><img src="${b.image||''}" alt="${title}" onerror="this.style.display='none'">
            <div class="info"><div class="title">${title}</div><div class="author">${author}</div><div class="publisher">${b.publisher}</div></div></div>`;
        });
        right.innerHTML += grid + '</div>';
      }

      right.innerHTML += '<div class="status-bar">📰 예스24 베스트셀러 뉴스 수집 중…</div>';
      const newsQuery = v.genre !== '전체' ? `예스24 베스트셀러 ${v.genre}` : `예스24 베스트셀러 ${v.keyword}`;
      const news = await fetchNews(newsQuery);
      const newsText = news.map(n => n.title + ' ' + n.description).join('\n');

      right.querySelector('.status-bar:last-of-type').textContent = '🤖 AI 트렌드 분석 중…';

      const bookList = books.slice(0,20).map(b=>`${b.title.replace(/<[^>]+>/g,'')} / ${b.author.replace(/<[^>]+>/g,'')} / ${b.publisher}`).join('\n');
      const prompt = `출판 기획편집자를 위한 도서시장 트렌드 분석을 해주세요.

키워드: ${v.keyword}
분야: ${v.genre}

[네이버 최신 도서 30권]
${bookList}

[예스24 베스트셀러 뉴스]
${newsText}

다음 형식으로 분석해주세요:

【이번 트렌드 핵심 요약】
3줄 이내

【주목할 도서 & 기획 포인트】
3권 선정, 각 도서별 기획 포인트

【공통 키워드 & 독자 니즈】
키워드 5개 + 각 설명

【기획 인사이트】
다음 기획에 반영할 시사점 3가지

【추천 기획 방향】
이 트렌드를 활용한 신간 기획 아이디어 2개`;

      const aiResult = await callAI(prompt);
      const statusBars = right.querySelectorAll('.status-bar');
      statusBars.forEach(el => el.remove());
      right.innerHTML += `<div class="section-title">🤖 AI 트렌드 분석</div><div class="result-box">${aiResult}</div>`;
    }
  },

  compete: {
    fields: [
      { id: 'mytitle', label: '내 책 제목 (기획 중)', type: 'input', placeholder: '예: 바다에서 온 소년' },
      { id: 'keyword', label: '경쟁도서 검색 키워드', type: 'input', placeholder: '예: 바다 소년 성장 소설' },
      { id: 'point', label: '내 책의 차별화 포인트', type: 'textarea', placeholder: '어떤 점이 다른지 간단히 적어주세요' },
    ],
    run: async (v) => {
      const right = document.getElementById('rightPanel');
      right.innerHTML = '<div class="status-bar">📡 유사 도서 검색 중…</div>';

      const books = await fetchBooks(v.keyword, 30, 'sim');

      right.innerHTML = `<div class="section-title">🔍 유사 도서 비교표 (${books.length}건)</div>`;
      let tableHtml = `<table class="comp-table"><thead><tr>
        <th>표지</th><th>제목</th><th>저자</th><th>출판사</th><th>출간일</th><th>가격</th>
      </tr></thead><tbody>`;
      books.slice(0,20).forEach(b => {
        const title = b.title.replace(/<[^>]+>/g,'');
        const author = b.author.replace(/<[^>]+>/g,'');
        const date = b.pubdate ? b.pubdate.slice(0,4)+'.'+b.pubdate.slice(4,6) : '-';
        const price = b.discount ? parseInt(b.discount).toLocaleString()+'원' : '-';
        tableHtml += `<tr>
          <td><img src="${b.image||''}" style="width:45px;height:60px;object-fit:cover;border-radius:3px;" onerror="this.style.display='none'"></td>
          <td><strong>${title}</strong></td>
          <td>${author}</td>
          <td><span class="badge">${b.publisher}</span></td>
          <td>${date}</td>
          <td>${price}</td>
        </tr>`;
      });
      tableHtml += '</tbody></table>';
      right.innerHTML += tableHtml;
      right.innerHTML += '<div class="status-bar">🤖 AI 경쟁 분석 중…</div>';

      const bookList = books.slice(0,15).map(b=>`제목: ${b.title.replace(/<[^>]+>/g,'')} / 저자: ${b.author.replace(/<[^>]+>/g,'')} / 출판사: ${b.publisher} / 출간: ${b.pubdate||'-'} / 가격: ${b.discount||'-'}원`).join('\n');
      const prompt = `출판 기획편집자를 위한 경쟁도서 분석을 해주세요.

내 책: ${v.mytitle}
차별화 포인트: ${v.point}

경쟁 도서 목록 (${books.length}권):
${bookList}

【경쟁 강도 평가】상/중/하 + 이유
【경쟁도서 핵심 특징】상위 5권 각각 타깃독자·강점·약점
【시장 내 포지셔닝 제안】내 책이 파고들 수 있는 틈새
【차별화 전략】경쟁도서 대비 강조 포인트 3가지
【마케팅 방향 제안】이 경쟁 구도에서 효과적인 마케팅 전략`;

      const aiResult = await callAI(prompt);
      right.querySelector('.status-bar').remove();
      right.innerHTML += `<div class="section-title">🤖 AI 경쟁 분석</div><div class="result-box">${aiResult}</div>`;
    }
  },

  copy: {
    fields: [
      { id: 'author', label: '저자', type: 'input', placeholder: '예: 개럿 카' },
      { id: 'genre', label: '분야', type: 'select', options: ['소설/에세이', '인문/교양', '자기계발', '경제경영'] },
      { id: 'target', label: '주요 독자', type: 'input', placeholder: '예: 30대 직장인 여성' },
      { id: 'tone', label: '톤 & 무드', type: 'select', options: ['감성/서정적', '강렬/임팩트', '따뜻/위로', '지적/세련', '유머/가벼움'] },
      { id: 'desc', label: '책 소개 (핵심 메시지)', type: 'textarea', placeholder: '줄거리나 핵심 메시지를 입력해주세요' },
      { id: 'keyword', label: '핵심 키워드', type: 'input', placeholder: '예: 바다, 소년, 성장, 경계' },
      { id: 'file', label: '원고 파일 업로드 (PDF/DOCX/TXT)', type: 'file' },
    ],
    run: async (v, file) => {
      const right = document.getElementById('rightPanel');
      right.innerHTML = '<div class="status-bar">📡 베스트셀러 트렌드 수집 중…</div>';

      const [books, news] = await Promise.all([
        fetchBooks(v.keyword || v.genre, 30, 'sim'),
        fetchNews(`예스24 베스트셀러 ${v.genre}`)
      ]);

      right.querySelector('.status-bar').textContent = '🤖 제목안 & 카피 생성 중… (30초~1분 소요)';

      const bookTitles = books.slice(0,20).map(b => b.title.replace(/<[^>]+>/g,'')).join(', ');
      const newsText = news.map(n => n.title + ' ' + n.description).join('\n');
      const titlePattern = GENRE_TITLE_PATTERN[v.genre] || '';

      const prompt = `당신은 대한민국 최고의 출판 기획편집자이자 카피라이터입니다.
아래 정보를 바탕으로 베스트셀러가 될 제목안 10개와 마케팅 카피를 작성해주세요.

[도서 정보]
저자: ${v.author}
분야: ${v.genre}
주요 독자: ${v.target}
톤 & 무드: ${v.tone}
핵심 키워드: ${v.keyword}
책 소개: ${v.desc}

[${v.genre} 분야 제목 패턴]
${titlePattern}

[현재 베스트셀러 제목 트렌드
